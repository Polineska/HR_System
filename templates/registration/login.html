{% extends "analytics_app/base.html" %}
{% block title %}Вход{% endblock %}
{% block content %}
  <h1 class="h4 mb-3">Вход</h1>
  <div class="card" style="max-width: 520px;">
    <div class="card-body">
      <form method="post">
        {% csrf_token %}
        {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}

        {% if form.non_field_errors %}
          <div class="alert alert-danger">{{ form.non_field_errors }}</div>
        {% endif %}

        <div class="mb-3">
          <label class="form-label" for="id_username">Логин</label>
          <input class="form-control" type="text" name="username" autofocus required id="id_username">
        </div>
        <div class="mb-3">
          <label class="form-label" for="id_password">Пароль</label>
          <input class="form-control" type="password" name="password" required id="id_password">
        </div>

        <button class="btn btn-primary" type="submit">Войти</button>
        <a class="btn btn-link" href="{% url 'register' %}">Регистрация</a>
      </form>
    </div>
  </div>
{% endblock %}
